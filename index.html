<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Runner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <section class="hud" aria-label="game status">
      <div>
        <span>SCORE</span>
        <strong id="score">0</strong>
      </div>
      <div>
        <span>BEST SCORE</span>
        <strong id="bestScore">0</strong>
      </div>
      <div>
        <span>LEVEL</span>
        <strong id="level">1</strong>
      </div>
      <div>
        <span>SPEED</span>
        <strong id="speed">1.0x</strong>
      </div>
    </section>

    <section id="game" class="game day" aria-label="Pixel Runner game">
      <div class="sky">
        <div class="sun-moon" id="sunMoon">☀️</div>
        <div class="cloud cloud-a"></div>
        <div class="cloud cloud-b"></div>
        <div class="cloud cloud-c"></div>
      </div>

      <div class="mountains layer"></div>
      <div class="trees layer"></div>
      <div class="grass layer"></div>
      <div class="ground layer"></div>

      <div id="player" class="player running" aria-label="player">
        <div class="head"></div>
        <div class="body"></div>
        <div class="arm arm-front"></div>
        <div class="arm arm-back"></div>
        <div class="leg leg-front"></div>
        <div class="leg leg-back"></div>
      </div>

      <div id="statusBadge" class="status-badge hidden"></div>
      <div id="overlay" class="overlay"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
